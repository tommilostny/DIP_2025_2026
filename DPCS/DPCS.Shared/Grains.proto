syntax = "proto3";

option csharp_namespace = "DPCS.Shared";

import "google/protobuf/empty.proto";
import "Messages.proto";

/*=================== COORDINATOR GRAINS ==================================================*/

service JobManagerGrain {
  // RPC for agents to discover if there are any jobs available to work on
  rpc JobDiscovery (AgentId) returns (JobAssignment);

  // RPCs called by web interface to submit new jobs and query for work
  rpc JobSubmission (JobSpecsEnvelope) returns (JobAssignment);
  
  // RPC for web interface to cancel a job
  rpc CancelJob (JobId) returns (google.protobuf.Empty);

  // RPC for JobCoordinatorGrain to notify JobManagerGrain that a job has completed
  rpc FinishAck (JobId) returns (google.protobuf.Empty);

  rpc ListJobs (google.protobuf.Empty) returns (JobsCollection);
  rpc IsWordlistInUse (WordlistQuery) returns (WordlistUsageResponse);
}

service JobCoordinatorGrain {
  // Initialization RPC for new jobs submitted by JobManagerGrain
  rpc JobInit (JobSpecsEnvelope) returns (google.protobuf.Empty);

  rpc GetJobSpecs (google.protobuf.Empty) returns (JobSpecsEnvelope);

  // Work unit assignment RPC called by agents to request more work
  rpc WorkRequest (WorkRequest) returns (WorkAssignmentEnvelope);
  
  // RPC called by agents to submit results and report status
  rpc WorkResultSubmission (WorkResult) returns (google.protobuf.Empty);
  
  // RPC for agents to send periodic heartbeats with telemetry data
  rpc Heartbeat (AgentTelemetry) returns (google.protobuf.Empty);
  
  // RPC for web interface to query job status and progress
  rpc GetJobStatus (google.protobuf.Empty) returns (JobStatus);

  // RPC for exporting work-unit lifecycle records (JSON/CSV endpoints consume this)
  rpc GetWorkUnitLifecycle (WorkUnitLifecycleFilter) returns (WorkUnitLifecycleExport);

  // RPC for exporting per-agent GPU telemetry history for time-series report charts
  rpc GetAgentGpuTelemetryHistory (google.protobuf.Empty) returns (AgentGpuTelemetryExport);

  // RPC for exporting job progress snapshots for time-series report charts
  rpc GetJobProgressHistory (google.protobuf.Empty) returns (JobProgressHistoryExport);

  // RPC for web interface to cancel an ongoing job
  rpc CancelJob (google.protobuf.Empty) returns (google.protobuf.Empty);
}

service ResultCollectorGrain {
  // RPC for JobCoordinatorGrain to store results submitted by agents
  rpc StoreResult (JobResult) returns (google.protobuf.Empty);
  rpc RegisterJob (JobRegistration) returns (google.protobuf.Empty);
  rpc UpdateJobProgress (JobProgressUpdate) returns (google.protobuf.Empty);
}
