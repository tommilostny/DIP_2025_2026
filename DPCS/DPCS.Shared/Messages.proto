syntax = "proto3";

option csharp_namespace = "DPCS.Shared";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// Signed Job ID
message JobId {
  string id = 1;
}

// Agent node as identified by Proto.PID
message AgentId {
  string address = 1;
  string id = 2;
}

// Job assignment message returned by JobManagerGrain in response to JobDiscovery RPC
message JobAssignment {
  string job_id = 1;
  int32 mode_id = 2;
  int32 hash_type = 3;
  repeated string hashes = 4;
  repeated string masks = 5;
  repeated string wordlists = 6;
}

// Parameters for submitting a Hashcat mask attack job by user in the web interface
message HashcatMaskJobSpecs {
  repeated string masks = 1;
  int32 min_length = 2;
  int32 max_length = 3;
  string custom_charset1 = 4;
  string custom_charset2 = 5;
  string custom_charset3 = 6;
  string custom_charset4 = 7;
}

// Parameters for submitting a Hashcat dictionary attack job by user in the web interface
message HashcatDictionaryJobSpecs {
  repeated string wordlists = 1;
  repeated string rule_files = 2;
}

// Parameters for submitting a Hashcat combinator attack job by user in the web interface
message HashcatCombinatorJobSpecs {
  repeated string left_wordlists = 1;
  repeated string right_wordlists = 2;
  repeated string rule_files = 3;
}

message JobSpecsEnvelope {
  // Common fields for all attack jobs
  repeated string hashes = 1;
  uint32 chunk_time_seconds = 2;
  int32 hash_type = 3;

  // Oneof to hold specific job specs
  oneof payload {
    HashcatMaskJobSpecs mask_job_specs = 4;
    HashcatDictionaryJobSpecs dictionary_job_specs = 5;
    HashcatCombinatorJobSpecs combinator_job_specs = 6;
  }
}

// Message sent by agent to request more work
message WorkRequest {
  AgentId agent_id = 1;
  string job_id = 2;
  uint64 current_hashrate = 3;
}

// Message for Attack Mode 3 (Stateless) - JobCoordinator provides mask and keyspace info
message MaskWorkAssignment {
  string mask = 1;
  uint64 keyspace_start = 2;
  uint64 keyspace_length = 3;
  string custom_charset1 = 4;
  string custom_charset2 = 5;
  string custom_charset3 = 6;
  string custom_charset4 = 7;
}

// Message for Attack Mode 0 (Stateful) - JobCoordinator provides dictionary chunk info
message DictionaryWorkAssignment {
  string dictionary_chunk_url = 1; // HTTP URL to download the chunk
  string dictionary_chunk_checksum = 2; // SHA256 to verify integrity
  string rule_file_content = 3; // Optional rules to apply
}

message CombinatorWorkAssignment {
  string left_dictionary_chunk_url = 1;
  string right_dictionary_chunk_url = 2;
  string left_dictionary_chunk_checksum = 3;
  string right_dictionary_chunk_checksum = 4;
  string rule_file_content = 5;
  string left_wordlist_name = 6;
  string right_wordlist_name = 7;
  int64 left_start_byte = 8;
  int64 left_end_byte = 9;
  int64 right_start_byte = 10;
  int64 right_end_byte = 11;
}

message WorkAssignmentEnvelope {
  // Common fields for all work assignments
  string job_id = 1;
  string request_id = 2; // Unique ID for deduplication

  // Oneof to hold specific work assignment
  oneof payload {
    MaskWorkAssignment mask_assignment = 3;
    DictionaryWorkAssignment dictionary_assignment = 4;
    CombinatorWorkAssignment combinator_assignment = 5;
  }
}

message RecoveredPassword {
  string hash = 1;
  string plaintext = 2;
  int32 hash_type = 3;
}

// Message sent by agent to submit work chunk result
message WorkResult {
  AgentId agent_id = 1;
  bool success = 2;
  repeated RecoveredPassword recovered_passwords = 3; // Optional
  string request_id = 4;
}

// Message for final job results
message JobResult {
  string job_id = 1;
  repeated RecoveredPassword recovered_passwords = 2;
  google.protobuf.Timestamp cracked_at = 3;
  google.protobuf.Duration time_taken = 4;
  int32 attack_mode = 5; // e.g. "Mask Attack", "Dictionary Attack"
}

// Telemetry data sent by agent to coordinator, to mark it as alive and provide status
message AgentTelemetry {
  AgentId agent_id = 1;
  int64 current_hashrate = 2;
  int32 temperature = 3;
  int32 fan_speed = 4;
  int32 gpu_utilization = 5;
  float reject_rate = 6;
}

message AssignedChunk {
  string request_id = 1;
  string mask = 2;
  uint64 keyspace_start = 3;
  uint64 keyspace_end = 4;
  uint64 total_keyspace = 5;
  string wordlist_name = 6;
  int64 byte_start = 7;
  int64 byte_end = 8;
}

message AgentStatus {
  AgentTelemetry telemetry = 2;
  repeated AssignedChunk assigned_chunks = 3;
}

// Message for reporting job status in response to GetJobStatus RPC
message JobStatus {
  string job_id = 1;
  string status = 2; // e.g. "In Progress", "Completed", "Cancelled"
  float progress_percentage = 3; // e.g. 75.5 for 75.5% completed
  uint64 chunk_attack_seconds = 4;
  repeated AgentStatus agents = 5;
  repeated RecoveredPassword recovered_passwords = 6;
}

message JobsCollection {
  repeated JobAssignment jobs = 1;
}

message JobRegistration {
    string job_id = 1;
    int32 attack_mode = 2;
    int32 hash_type = 3;
    google.protobuf.Timestamp start_time = 4;
}

message JobProgressUpdate {
    string job_id = 1;
    float progress_percentage = 2;
    string status = 3; // e.g., "Running", "Completed", "Cancelled"
}

message WordlistQuery {
    string wordlist_name = 1;
}

message WordlistUsageResponse {
    bool is_in_use = 1;
}