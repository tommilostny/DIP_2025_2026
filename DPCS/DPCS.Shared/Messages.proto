syntax = "proto3";

option csharp_namespace = "DPCS.Shared";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// Signed Job ID
message JobId {
  string id = 1;
}

// Agent node as identified by Proto.PID
message AgentId {
  string address = 1;
  string id = 2;
}

// Job assignment message returned by JobManagerGrain in response to JobDiscovery RPC
message JobAssignment {
  string job_id = 1;
  int32 mode_id = 2;
  int32 hash_type = 3;
  repeated string hashes = 4;
  repeated string masks = 5;
  repeated string wordlists = 6;
  string rule_file_content = 7;
}

// Parameters for submitting a Hashcat mask attack job by user in the web interface
message HashcatMaskJobSpecs {
  repeated string masks = 1;
  int32 min_length = 2;
  int32 max_length = 3;
  string custom_charset1 = 4;
  string custom_charset2 = 5;
  string custom_charset3 = 6;
  string custom_charset4 = 7;
}

// Parameters for submitting a Hashcat dictionary attack job by user in the web interface
message HashcatDictionaryJobSpecs {
  repeated string wordlists = 1;
  string rule_file_content = 2;
}

// Parameters for submitting a Hashcat combinator attack job by user in the web interface
message HashcatCombinatorJobSpecs {
  repeated string left_wordlists = 1;
  repeated string right_wordlists = 2;
  string rule_file_content = 3;
}

// Parameters for submitting a Hashcat hybrid attack job by user in the web interface
message HashcatHybridJobSpecs {
  repeated string wordlists = 1;
  repeated string masks = 2;
  string custom_charset1 = 4;
  string custom_charset2 = 5;
  string custom_charset3 = 6;
  string custom_charset4 = 7;
  int32 attack_mode = 8; // 6 for Hybrid Wordlist + Mask, 7 for Hybrid Mask + Wordlist
}

message JobSpecsEnvelope {
  // Common fields for all attack jobs
  repeated string hashes = 1;
  uint32 chunk_time_seconds = 2;
  int32 hash_type = 3;

  // Oneof to hold specific job specs
  oneof payload {
    HashcatMaskJobSpecs mask_job_specs = 4;
    HashcatDictionaryJobSpecs dictionary_job_specs = 5;
    HashcatCombinatorJobSpecs combinator_job_specs = 6;
    HashcatHybridJobSpecs hybrid_job_specs = 7;
  }
}

// Message sent by agent to request more work
message WorkRequest {
  AgentId agent_id = 1;
  string job_id = 2;
  uint64 current_hashrate = 3;
}

// Message for Attack Mode 3 (Stateless) - JobCoordinator provides mask and keyspace info
message MaskWorkAssignment {
  string mask = 1;
  uint64 keyspace_start = 2;
  uint64 keyspace_length = 3;
  string custom_charset1 = 4;
  string custom_charset2 = 5;
  string custom_charset3 = 6;
  string custom_charset4 = 7;
}

// Message for Attack Mode 0 (Stateful) - JobCoordinator provides dictionary chunk info
message DictionaryWorkAssignment {
  string wordlist_url = 1; // HTTP URL to download the chunk
  string wordlist_chunk_checksum = 2; // SHA256 to verify integrity
  string wordlist_name = 3; // Name of the wordlist for reference
  int64 start_byte = 4; // Start byte of the chunk in the wordlist
  int64 end_byte = 5; // End byte of the chunk in the wordlist
}

message CombinatorWorkAssignment {
  string left_wordlist_url = 1;
  string right_wordlist_url = 2;
  string left_wordlist_chunk_checksum = 3;
  string right_wordlist_chunk_checksum = 4;
  string left_wordlist_name = 5;
  string right_wordlist_name = 6;
  int64 left_start_byte = 7;
  int64 left_end_byte = 8;
  int64 right_start_byte = 9;
  int64 right_end_byte = 10;
}

message HybridWorkAssignment {
  string wordlist_url = 1;
  string wordlist_chunk_checksum = 2;
  string wordlist_name = 3;
  int64 start_byte = 4;
  int64 end_byte = 5;
  string mask = 6;
  uint64 keyspace_start = 7;
  uint64 keyspace_length = 8;
  string custom_charset1 = 9;
  string custom_charset2 = 10;
  string custom_charset3 = 11;
  string custom_charset4 = 12;
  int32 attack_mode = 13; // 6 for Hybrid Wordlist + Mask, 7 for Hybrid Mask + Wordlist
}

message WorkAssignmentEnvelope {
  // Common fields for all work assignments
  string job_id = 1;
  string request_id = 2; // Unique ID for deduplication

  // Oneof to hold specific work assignment
  oneof payload {
    MaskWorkAssignment mask_assignment = 3;
    DictionaryWorkAssignment dictionary_assignment = 4;
    CombinatorWorkAssignment combinator_assignment = 5;
    HybridWorkAssignment hybrid_assignment = 6;
  }
}

message RecoveredPassword {
  string hash = 1;
  string plaintext = 2;
  int32 hash_type = 3;
}

// Message sent by agent to submit work chunk result
message WorkResult {
  AgentId agent_id = 1;
  bool success = 2;
  repeated RecoveredPassword recovered_passwords = 3; // Optional
  string request_id = 4;
}

// Message for final job results
message JobResult {
  string job_id = 1;
  repeated RecoveredPassword recovered_passwords = 2;
  google.protobuf.Timestamp cracked_at = 3;
  google.protobuf.Duration time_taken = 4;
  int32 attack_mode = 5; // e.g. "Mask Attack", "Dictionary Attack"
}

// Telemetry data sent by agent to coordinator, to mark it as alive and provide status
message AgentTelemetry {
  AgentId agent_id = 1;
  int64 current_hashrate = 2;
  int32 temperature = 3;
  int32 fan_speed = 4;
  int32 gpu_utilization = 5;
  float reject_rate = 6;
  repeated GpuDeviceTelemetry gpu_devices = 7;
}

message GpuDeviceTelemetry {
  int32 device_index = 1;
  string device_name = 2;
  int64 current_hashrate = 3;
  int32 temperature = 4;
  int32 fan_speed = 5;
  int32 gpu_utilization = 6;
  int64 vram_total_bytes = 7;
  int64 vram_used_bytes = 8;
  int32 vram_utilization = 9;
}

message MaskAssignedChunk {
  string mask = 1;
  uint64 keyspace_start = 2;
  uint64 keyspace_end = 3;
  uint64 total_keyspace = 4;
}

message DictionaryAssignedChunk {
  string wordlist_name = 1;
  int64 byte_start = 2;
  int64 byte_end = 3;
}

message CombinatorAssignedChunk {
  string left_wordlist_name = 1;
  int64 left_byte_start = 2;
  int64 left_byte_end = 3;
  string right_wordlist_name = 4;
  int64 right_byte_start = 5;
  int64 right_byte_end = 6;
}

message HybridAssignedChunk {
  string wordlist_name = 1;
  int64 byte_start = 2;
  int64 byte_end = 3;
  string mask = 4;
  uint64 keyspace_start = 5;
  uint64 keyspace_end = 6;
  uint64 total_keyspace = 7;
  string custom_charset1 = 8;
  string custom_charset2 = 9;
  string custom_charset3 = 10;
  string custom_charset4 = 11;
}

message AssignedChunk {
  string request_id = 1;
  oneof payload {
    MaskAssignedChunk mask_chunk = 2;
    DictionaryAssignedChunk dictionary_chunk = 3;
    CombinatorAssignedChunk combinator_chunk = 4;
    HybridAssignedChunk hybrid_chunk = 5;
  }
}

message AgentStatus {
  AgentTelemetry telemetry = 2;
  repeated AssignedChunk assigned_chunks = 3;
}

// Message for reporting job status in response to GetJobStatus RPC
message JobStatus {
  string job_id = 1;
  string status = 2; // e.g. "In Progress", "Completed", "Cancelled"
  float progress_percentage = 3; // e.g. 75.5 for 75.5% completed
  uint64 chunk_attack_seconds = 4;
  repeated AgentStatus agents = 5;
  repeated RecoveredPassword recovered_passwords = 6;
  repeated AgentStatus participating_agents = 7;
}

message JobsCollection {
  repeated JobAssignment jobs = 1;
}

message JobRegistration {
    string job_id = 1;
    int32 attack_mode = 2;
    int32 hash_type = 3;
    google.protobuf.Timestamp start_time = 4;
}

message JobProgressUpdate {
    string job_id = 1;
    float progress_percentage = 2;
    string status = 3; // e.g., "Running", "Completed", "Cancelled"
}

message WordlistQuery {
    string wordlist_name = 1;
}

message WordlistUsageResponse {
    bool is_in_use = 1;
}

message WorkUnitLifecycleFilter {
  string outcome = 1;
  int64 from_unix_ms = 2;
  int64 to_unix_ms = 3;
}

message WorkUnitLifecycleRecord {
  string request_id = 1;
  string job_id = 2;
  string mode = 3;
  string agent_key = 4;
  string chunk_summary = 5;
  google.protobuf.Timestamp assigned_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  google.protobuf.Timestamp timed_out_at = 8;
  string outcome = 9;
  double processing_duration_seconds = 10;
  int32 recovered_count = 11;
}

message WorkUnitLifecycleExport {
  string job_id = 1;
  repeated WorkUnitLifecycleRecord records = 2;
}

message AgentGpuTelemetrySample {
  string agent_key = 1;
  google.protobuf.Timestamp captured_at = 2;
  int64 current_hashrate = 3;
  int32 temperature = 4;
  int32 fan_speed = 5;
  int32 gpu_utilization = 6;
  repeated GpuDeviceTelemetry gpu_devices = 7;
}

message AgentGpuTelemetryExport {
  string job_id = 1;
  repeated AgentGpuTelemetrySample samples = 2;
}