syntax = "proto3";

option csharp_namespace = "DPCS.Shared";

// Signed Job ID
message JobId {
  string id = 1;
}

// Agent node as identified by Proto.PID
message AgentId {
  string address = 1;
  string id = 2;
}

// Job assignment message returned by JobManagerGrain in response to JobDiscovery RPC
message JobAssignment {
  string job_id = 1;
  int32 mode_id = 2;
  int32 hash_type = 3;
  repeated string hashes = 4;
}

// Parameters for submitting a Hashcat mask attack job by user in the web interface
message HashcatMaskJobSpecs {
  repeated string hashes = 1;
  string mask = 2;
  int32 min_length = 3;
  int32 max_length = 4;
  int32 hash_type = 5;
}

// Parameters for submitting a Hashcat dictionary attack job by user in the web interface
message HashcatDictionaryJobSpecs {
  repeated string hashes = 1;
  repeated string wordlists = 2;
  int32 hash_type = 3;
}

// Message sent by agent to request more work
message WorkRequest {
  AgentId agent_id = 1;
  string job_id = 2;
  uint64 current_hashrate = 3;
}

// Message for Attack Mode 3 (Stateless) - JobCoordinator provides mask and keyspace info
message MaskWorkAssignment {
  string job_id = 1;
  string request_id = 2; // Unique ID for deduplication
  string extra_args = 3; // e.g. "--optimized-kernel"
  
  string mask = 4;
  uint64 keyspace_start = 5;
  uint64 keyspace_length = 6;
}

// Message for Attack Mode 0 (Stateful) - JobCoordinator provides dictionary chunk info
message DictionaryWorkAssignment {
  string job_id = 1;
  string request_id = 2; // Unique ID for deduplication
  string extra_args = 3; // e.g. "--optimized-kernel"

  string dictionary_chunk_url = 4; // HTTP URL to download the chunk
  string dictionary_chunk_checksum = 5; // SHA256 to verify integrity
  string rule_file_content = 6; // Optional rules to apply
}

message RecoveredPassword {
  string hash = 1;
  string plaintext = 2;
}

// Message sent by agent to submit work result
message WorkResult {
  AgentId agent_id = 1;
  bool success = 2;
  repeated RecoveredPassword recovered_passwords = 3; // Optional
}

// Telemetry data sent by agent to coordinator, to mark it as alive and provide status
message AgentTelemetry {
  AgentId agent_id = 1;
  double current_hashrate = 2;
  double average_temperature = 3;
  double average_fan_speed = 4;
}

// Message for reporting job status in response to GetJobStatus RPC
message JobStatus {
  string job_id = 1;
  string status = 2; // e.g. "In Progress", "Completed", "Cancelled"
  double progress_percentage = 3; // e.g. 75.5 for 75.5% completed
}